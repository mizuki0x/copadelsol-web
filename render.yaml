services:
  - type: web
    name: Blue Line
    runtime: static
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: .
    autoDeployTrigger: checksPass
    domains:
      - bluelinegame.com
    headers:
      - path: /game/*
        name: Content-Security-Policy
        value: "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.reown.com; img-src 'self' data: blob:; connect-src 'self' https: wss:; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests"
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.reown.com; img-src 'self' data: blob:; connect-src 'self' https: wss:; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests"
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), geolocation=(), microphone=(), payment=(), usb=()
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: X-Permitted-Cross-Domain-Policies
        value: none
      - path: /game/*.js
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /game/*.wasm
        name: Cache-Control
        value: public, max-age=31536000, immutable
